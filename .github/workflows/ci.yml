name: Automation Demo CI

on:
  push:
    branches: ['main', 'master']
  pull_request:
  workflow_dispatch:

concurrency:
  group: automation-demo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java for Allure
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Create environment file
        run: cp .env.example .env

      - name: Run TypeScript validation
        run: npx tsc --noEmit

      - name: Run Playwright suite
        run: xvfb-run -a npx playwright test tests/e2e --project=${{ matrix.project }}

      - name: Generate Allure report
        if: always()
        run: npm run report:allure

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: reports/playwright/html
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright raw artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-artifacts-${{ matrix.project }}
          path: |
            reports/allure-results
            reports/allure-report
            reports/logs
            reports/playwright/test-results
          if-no-files-found: ignore
          retention-days: 14

  cucumber:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser for Cucumber
        run: npx playwright install --with-deps chromium

      - name: Create environment file
        run: cp .env.example .env

      - name: Run Cucumber suite
        run: xvfb-run -a npx cucumber-js --config cucumber.js

      - name: Upload Cucumber evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-artifacts
          path: |
            reports/cucumber
            reports/screenshots
            reports/logs
          if-no-files-found: ignore
          retention-days: 14
